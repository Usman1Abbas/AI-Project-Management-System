<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="ProjectPulse — AI project coordination, from scaffold to delivery report">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#125a4d"/>
      <stop offset="1" stop-color="#1b9c85"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#e9c46a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#e9c46a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: kanban board + pulse/heartbeat line -->
  <g transform="translate(980,190)" stroke="#e9c46a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- kanban board frame -->
    <rect x="-90" y="-70" width="180" height="140" rx="12"/>
    <!-- two column dividers -->
    <line x1="-30" y1="-70" x2="-30" y2="70"/>
    <line x1="30" y1="-70" x2="30" y2="70"/>
    <!-- cards in columns -->
    <rect x="-78" y="-56" width="36" height="20" rx="4"/>
    <rect x="-78" y="-28" width="36" height="20" rx="4"/>
    <rect x="-18" y="-56" width="36" height="20" rx="4"/>
    <rect x="42" y="-56" width="36" height="20" rx="4"/>
    <!-- pulse / heartbeat line across the board -->
    <polyline points="-86,40 -56,40 -42,12 -22,64 -2,24 18,40 86,40"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">ProjectPulse</text>
  <text x="84" y="232" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#e9c46a">AI project coordination &amp; delivery intelligence</text>
  <text x="84" y="288" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#dcefe9">Scaffold repos, track every commit, and ship LLM-written progress reports.</text>
  <text x="84" y="324" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#9ec9bf">FastAPI · React · Gemini · GitHub API · Microsoft Teams</text>
</svg>
